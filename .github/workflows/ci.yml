name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      DEBUG: "false"
      # 空 Key 让任何漏掉 Mock 的路径也不会访问真实 AI；AI 单测注入 fake client。
      DASHSCOPE_API_KEY: ""
      REDIS_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run tests
        run: pytest

  frontend:
    name: Frontend build (Node.js 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # 仅用于静态构建验证，不会发起请求，也避免产物误含 localhost。
      VITE_API_BASE_URL: https://api.example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend contract tests
        run: npm test
      - name: Build
        run: npm run build
